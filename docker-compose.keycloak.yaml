services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloakpass
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - keycloaknet
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak"]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:latest
    environment:
      KC_DB: postgres
      KC_DB_URL_HOST: postgres
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloakpass
      KC_DB_DATABASE: keycloak
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: adminpass
      KC_HTTPS_CERTIFICATE_FILE: /opt/keycloak/conf/tls.crt
      KC_HTTPS_CERTIFICATE_KEY_FILE: /opt/keycloak/conf/tls.key
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "false"
    command: start
    volumes:
      - /opt/keycloak/tls.crt:/opt/keycloak/conf/tls.crt:ro
      - /opt/keycloak/tls.key:/opt/keycloak/conf/tls.key:ro
    ports:
      - "8443:8443"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - keycloaknet
    healthcheck:
      test: ["CMD", "curl", "-sk", "https://localhost:8443/health"]
      interval: 30s
      timeout: 10s
      retries: 5

volumes:
  pgdata:

networks:
  keycloaknet:
