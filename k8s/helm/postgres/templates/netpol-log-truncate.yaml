---
# NetworkPolicy — autorise le pod CronJob log-truncate à joindre l'API server et le DNS
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Chart.Name }}-log-truncate-netpol
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "postgres.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app: {{ .Chart.Name }}-log-truncate
  policyTypes:
    - Egress
  egress:
    # Kubernetes API server (pour kubectl exec)
    - ports:
        - protocol: TCP
          port: 443
    # DNS
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
