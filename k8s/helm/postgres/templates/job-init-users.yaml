apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Chart.Name }}-init-users-{{ .Release.Revision }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "postgres.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 5
  activeDeadlineSeconds: 120
  template:
    metadata:
      labels:
        {{- include "postgres.selectorLabels" . | nindent 8 }}
    spec:
      restartPolicy: OnFailure
      nodeSelector:
        {{- toYaml .Values.nodeSelector | nindent 8 }}
      tolerations:
        {{- toYaml .Values.tolerations | nindent 8 }}
      containers:
        - name: init-users
          image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
          command: ["/bin/bash", "/scripts/init-users.sh"]
          env:
            - name: PGHOST
              value: {{ .Chart.Name }}-primary
            - name: PGPORT
              value: "5432"
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Chart.Name }}-credentials
                  key: POSTGRES_PASSWORD
            - name: BACKUP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Chart.Name }}-credentials
                  key: BACKUP_PASSWORD
            - name: RESTORE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Chart.Name }}-credentials
                  key: RESTORE_PASSWORD
            - name: KEYCLOAK_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Chart.Name }}-credentials
                  key: KEYCLOAK_PASSWORD
          volumeMounts:
            - name: scripts
              mountPath: /scripts
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              memory: 64Mi
      volumes:
        - name: scripts
          configMap:
            name: {{ .Chart.Name }}-config
            defaultMode: 0755
            items:
              - key: init-users.sh
                path: init-users.sh
