---
# NetworkPolicy — autorise le trafic HBONE (port 15008) utilisé par Istio Ambient ztunnel
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-hbone
  namespace: {{ .Values.namespace }}
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 15008
  egress:
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 15008
