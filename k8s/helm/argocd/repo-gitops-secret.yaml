# ---------------------------------------------------------------------------
# repo-gitops-secret.yaml — Credentials GitHub pour le repo GitOps
#
# Prérequis : un PAT GitHub avec accès au repo devops-formation-gitops
#
# Usage local :
#   source .env && envsubst < repo-gitops-secret.yaml | kubectl apply -f -
#
# Usage CI/CD :
#   Les variables GITHUB_USERNAME et GITHUB_PAT sont définies en secrets
#   dans le pipeline (GitHub Actions, GitLab CI, etc.)
#   envsubst < repo-gitops-secret.yaml | kubectl apply -f -
#
# Le label argocd.argoproj.io/secret-type=repository permet à ArgoCD
# de détecter automatiquement ce repo.
# ---------------------------------------------------------------------------
apiVersion: v1
kind: Secret
metadata:
  name: repo-gitops
  namespace: argocd
  labels:
    argocd.argoproj.io/secret-type: repository
type: Opaque
stringData:
  type: git
  url: https://github.com/juba-touam/devops-formation-gitops.git
  username: ${GITHUB_USERNAME}
  password: ${GITHUB_PAT}
