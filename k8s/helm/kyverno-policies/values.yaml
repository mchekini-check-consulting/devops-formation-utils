validationFailureAction: Audit

enforceNamespaces:
  - prod

excludeNamespaces:
  - kube-system
  - kyverno
  - argocd
  - ingress-nginx
  - sonarqube
  - calico-system
  - tigera-operator
  - argo-rollouts
  - vault
  - external-secrets
  - reloader
  - cert-manager
  - keycloak

allowedRegistries:
  - "docker.io/library/*"
  - "docker.io/bitnami/*"
  - "ghcr.io/*"
  - "registry.k8s.io/*"
  - "quay.io/*"
  - "*.azurecr.io/*"
  - "docker.io/bitnamilegacy/*"

requiredLabels:
  - "app.kubernetes.io/name"
  - "app.kubernetes.io/managed-by"
