apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: disallow-host-namespaces
  annotations:
    policies.kyverno.io/title: Disallow Host Namespaces
    policies.kyverno.io/category: Pod Security
    policies.kyverno.io/severity: high
    policies.kyverno.io/description: >-
      Host namespaces (PID, IPC, Network) should not be shared with
      containers. This policy ensures pods do not use host namespaces.
spec:
  validationFailureAction: {{ .Values.validationFailureAction }}
  validationFailureActionOverrides:
    {{- range .Values.enforceNamespaces }}
    - action: Enforce
      namespaces:
        - {{ . }}
    {{- end }}
  rules:
    - name: disallow-host-namespaces
      match:
        any:
          - resources:
              kinds:
                - Pod
      exclude:
        any:
          - resources:
              namespaces:
                {{- range .Values.excludeNamespaces }}
                - {{ . }}
                {{- end }}
      validate:
        message: "Sharing host PID, IPC, or Network namespaces is disallowed."
        pattern:
          spec:
            =(hostPID): false
            =(hostIPC): false
            =(hostNetwork): false
