apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-run-as-non-root
  annotations:
    policies.kyverno.io/title: Require runAsNonRoot
    policies.kyverno.io/category: Pod Security
    policies.kyverno.io/severity: high
    policies.kyverno.io/description: >-
      Containers must run as non-root users. This policy ensures that
      runAsNonRoot is set to true in the pod or container securityContext.
spec:
  failureAction: {{ .Values.failureAction }}
  failureActionOverrides:
    {{- range .Values.enforceNamespaces }}
    - action: Enforce
      namespaces:
        - {{ . }}
    {{- end }}
  rules:
    - name: require-run-as-non-root
      match:
        any:
          - resources:
              kinds:
                - Pod
      exclude:
        any:
          - resources:
              namespaces:
                {{- range .Values.excludeNamespaces }}
                - {{ . }}
                {{- end }}
      validate:
        message: "Running as root is not allowed. Set spec.securityContext.runAsNonRoot to true."
        anyPattern:
          - spec:
              securityContext:
                runAsNonRoot: true
              containers:
                - =(securityContext):
                    =(runAsNonRoot): true
              =(initContainers):
                - =(securityContext):
                    =(runAsNonRoot): true
              =(ephemeralContainers):
                - =(securityContext):
                    =(runAsNonRoot): true
          - spec:
              containers:
                - securityContext:
                    runAsNonRoot: true
              =(initContainers):
                - securityContext:
                    runAsNonRoot: true
              =(ephemeralContainers):
                - securityContext:
                    runAsNonRoot: true
