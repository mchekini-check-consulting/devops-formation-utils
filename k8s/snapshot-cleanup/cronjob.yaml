apiVersion: batch/v1
kind: CronJob
metadata:
  name: snapshot-cleanup
  namespace: velero
spec:
  schedule: "0 9 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 0
      template:
        metadata:
          labels:
            app: snapshot-cleanup
            azure.workload.identity/use: "true"
        spec:
          serviceAccountName: velero-server
          restartPolicy: OnFailure
          containers:
            - name: cleanup
              image: mcr.microsoft.com/azure-cli:latest
              command: ["/bin/bash", "-c"]
              args:
                - |
                  set -e

                  # Authentification via Workload Identity
                  az login --service-principal \
                    -u "$AZURE_CLIENT_ID" \
                    -t "$AZURE_TENANT_ID" \
                    --federated-token "$(cat $AZURE_FEDERATED_TOKEN_FILE)" \
                    --output none

                  RG="MC_rg-formation-ecom-aks_aks-formation-ecom_francecentral"
                  YESTERDAY=$(date -u -d @$(( $(date +%s) - 86400 )) +%Y-%m-%d)
                  echo "Keeping snapshots from $YESTERDAY, deleting older ones..."

                  TO_DELETE=$(az snapshot list --resource-group "$RG" \
                    --query "[?timeCreated < '${YESTERDAY}T00:00:00'].id" -o tsv)

                  if [ -z "$TO_DELETE" ]; then
                    echo "Nothing to delete."
                    exit 0
                  fi

                  echo "$TO_DELETE" | while read -r id; do
                    echo "Deleting: $(basename $id)"
                    az snapshot delete --ids "$id"
                  done

                  echo "Remaining snapshots:"
                  az snapshot list --resource-group "$RG" \
                    --query "[].{name:name, date:timeCreated}" -o table
              resources:
                requests:
                  cpu: 100m
                  memory: 128Mi
                limits:
                  cpu: 250m
                  memory: 256Mi
